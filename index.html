<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medium — Mind Meld Game</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #14121f;
    --card: #1f1b31;
    --card2: #2a2444;
    --accent: #a78bfa;
    --accent2: #f0abfc;
    --good: #4ade80;
    --bad: #f87171;
    --text: #ece9f7;
    --muted: #9d97b5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse at top, #1d1833 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100dvh;
  }
  #app {
    width: 100%;
    max-width: 480px;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  h1 {
    font-size: 2rem;
    text-align: center;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 2px;
  }
  .tagline { text-align: center; color: var(--muted); font-size: .9rem; margin-top: -8px; }
  .card {
    background: var(--card);
    border: 1px solid #332c52;
    border-radius: 16px;
    padding: 16px;
  }
  button {
    font: inherit;
    font-weight: 600;
    color: #14121f;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 14px 18px;
    width: 100%;
    cursor: pointer;
    font-size: 1.05rem;
    transition: transform .08s, opacity .15s;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .35; cursor: default; }
  button.secondary {
    background: var(--card2);
    color: var(--text);
    border: 1px solid #443a6b;
  }
  button.word-btn {
    background: var(--card2);
    color: var(--text);
    border: 2px solid #443a6b;
    font-size: 1.15rem;
    padding: 16px;
  }
  button.word-btn.selected { border-color: var(--accent); background: #35296b; }
  input[type=text] {
    font: inherit;
    font-size: 1.1rem;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #443a6b;
    background: var(--card2);
    color: var(--text);
    text-align: center;
  }
  input[type=text]:focus { outline: 2px solid var(--accent); }
  .label { color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .big-code {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: .5em;
    text-align: center;
    padding-left: .5em;
    color: var(--accent2);
  }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row > * { flex: 1; }
  .player-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card2); border-radius: 999px;
    padding: 6px 14px; margin: 3px; font-size: .95rem;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); }
  .dot.off { background: var(--bad); }
  button.chip-x {
    background: none; border: none; color: var(--muted);
    width: auto; padding: 0 0 0 2px; font-size: 1rem; line-height: 1; cursor: pointer;
  }
  .status-banner {
    text-align: center; color: var(--muted); font-size: .95rem;
    padding: 4px 0;
  }
  .pair-words {
    display: flex; gap: 10px; justify-content: center; align-items: center;
  }
  .pair-word {
    flex: 1;
    background: var(--card2);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 16px 8px;
    text-align: center;
    font-size: 1.25rem;
    font-weight: 700;
  }
  .pair-word .who { display: block; font-size: .7rem; color: var(--muted); font-weight: 400; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .vs { color: var(--muted); font-size: .9rem; }
  .attempt-pill {
    display: inline-block; padding: 4px 12px; border-radius: 999px;
    background: var(--card2); color: var(--accent2); font-weight: 700; font-size: .85rem;
    border: 1px solid #443a6b;
  }
  .timer-pill {
    display: inline-block; padding: 4px 12px; border-radius: 999px; margin-left: 6px;
    background: var(--card2); color: var(--text); font-weight: 700; font-size: .85rem;
    border: 1px solid #443a6b; font-variant-numeric: tabular-nums;
  }
  .timer-pill.low { color: var(--bad); border-color: var(--bad); }
  .timer-pill.paused { color: var(--muted); }
  .history-row {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card2); border-radius: 10px; padding: 10px 14px;
    font-size: 1rem;
  }
  .history-row .mark { font-size: 1.1rem; }
  .match-flash {
    text-align: center; font-size: 1.6rem; font-weight: 800; padding: 10px;
  }
  .match-flash.good { color: var(--good); }
  .match-flash.bad { color: var(--bad); }
  table.score { width: 100%; border-collapse: collapse; }
  table.score td, table.score th { padding: 10px 8px; text-align: left; border-bottom: 1px solid #332c52; }
  table.score th { color: var(--muted); font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; }
  table.score td.pts { text-align: right; font-weight: 700; color: var(--accent2); }
  table.score tr.me td { color: var(--accent); }
  .round-header { text-align: center; }
  .round-header .rnum { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .round-header .partner { font-size: 1.3rem; font-weight: 700; margin-top: 2px; }
  .waiting-pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
  .hidden { display: none !important; }
  .small { font-size: .85rem; color: var(--muted); }
  .center { text-align: center; }
  .scoring-note { font-size: .8rem; color: var(--muted); text-align: center; }
  .pairs-list { display: flex; flex-direction: column; gap: 6px; }
  .pairs-list .pr { display: flex; justify-content: space-between; background: var(--card2); border-radius: 10px; padding: 8px 12px; font-size: .9rem; }
  .pairs-list .pr .st { color: var(--muted); }
  .pairs-list .pr .st.done { color: var(--good); }
  .pairs-list .pr .st.fail { color: var(--bad); }
  .pairs-list .pr-active { border: 1px solid var(--accent); }
  .pr-active-tag { color: var(--accent); font-weight: 700; }
</style>
</head>

/* Round-robin schedule (circle method) — every pair exactly once, no repeats */
function buildSchedule(ids) {
  const list = [...ids];
  if (list.length % 2 === 1) list.push(null); // bye slot
  const n = list.length;
  const rounds = [];
  const arr = [...list];
  for (let r = 0; r < n - 1; r++) {
    const pairs = [];
    for (let i = 0; i < n / 2; i++) {
      const a = arr[i], b = arr[n - 1 - i];
      if (a !== null && b !== null) pairs.push([a, b]);
    }
    rounds.push(pairs);
    arr.splice(1, 0, arr.pop()); // rotate all but first
  }
  return shuffle(rounds);
}

/* Classic edit-distance, used only to tolerate small typos in restart-roster name matching. */
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1]
        : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
    }
  }
  return dp[m][n];
}
/* Short names (<=3 chars) require an exact match — a flat edit-distance-1 threshold would wrongly
   merge distinct short names like "Sam"/"Pam". Longer names tolerate a single-character typo. */
function fuzzySame(a, b) {
  if (a === b) return true;
  if (Math.min(a.length, b.length) <= 3) return false;
  return levenshtein(a, b) <= 1;

/* Decide whether a new lobby roster is "the same group" as the game that just ended, for score

  if (!prevRoster || prevRoster.length !== currentPlayers.length) return null;
  const remaining = [...prevRoster];
  const result = new Map();
  for (const p of currentPlayers) {
    const na = norm(p.name);
    let idx = remaining.findIndex(r => r.pid && p.pid && r.pid === p.pid);
    if (idx === -1) {

        .map((r, i) => ({ i, d: fuzzySame(na, norm(r.name)) ? (na === norm(r.name) ? 0 : 1) : Infinity }))
        .filter(c => c.d !== Infinity)
        .sort((a, b) => a.d - b.d);
      if (candidates.length === 0) return null;
      if (candidates.length > 1 && candidates[0].d === candidates[1].d) return null; // ambiguous → refuse to guess
      idx = candidates[0].i;
    }
    result.set(p.id, remaining[idx].score);
    remaining.splice(idx, 1);
  }
  return result;
}

      if (p.lastPong != null && now - p.lastPong > HEARTBEAT_TIMEOUT) { dropPlayer(p.id); return; }

      const w = pair.picks[pid];
      pp.hand.splice(pp.hand.indexOf(w), 1);
      H.discard.push(w);
      pp.hand.push(drawWord());
    });
  }
  broadcast();
}

function handleGuess(id, word) {
  const pair = pairOf(id);
  if (isGameFrozen() || !pair || pair.phase !== "guess" || pair.guesses[id] !== undefined) return;
  if (!norm(word)) return;
  invalidateUndo(H.pairs.indexOf(pair));
  pair.guesses[id] = word.trim();
  if (pair.guesses[pair.a] !== undefined && pair.guesses[pair.b] !== undefined) {
    const ga = pair.guesses[pair.a], gb = pair.guesses[pair.b];
    const match = norm(ga) === norm(gb);
    pair.history.push({ a: ga, b: gb, match });
    pair.guesses = {};
    if (match) {
      pair.pointsBy = { [pair.a]: rollPoints(pair.attempt), [pair.b]: rollPoints(pair.attempt) };
      pair.phase = "done";
      H.timer = null;
      [pair.a, pair.b].forEach(pid => hostPlayer(pid).score += pair.pointsBy[pid]);
      advanceActivePair();
    } else if (pair.attempt >= MAX_ATTEMPTS) {
      pair.phase = "done";
      H.timer = null;
      advanceActivePair();
    } else {
      pair.attempt++;
      startGuessTimer(H.pairs.indexOf(pair));
    }
  }
  broadcast();
}

/* Local mode: pair said their words out loud — only the host reports the result (by pair index).
   This is a manual human tap, so it's the one action worth letting the host undo (see actUndoResult). */
function hostSetResult(i, match) {
  const pair = H.pairs[i];
  if (isGameFrozen() || H.mode !== "local" || !pair || pair.phase !== "guess") return;
  invalidateUndo(i);
  H.lastResult = {
    pairIndex: i,
    prevAttempt: pair.attempt,
    prevHistory: [...pair.history],
    prevPointsBy: pair.pointsBy,
    prevScoreA: hostPlayer(pair.a).score,
    prevScoreB: hostPlayer(pair.b).score,
    prevActivePair: H.activePair,
    promotedIndex: -1,
  };
  pair.history.push({ a: null, b: null, match });
  if (match) {
    pair.pointsBy = { [pair.a]: rollPoints(pair.attempt), [pair.b]: rollPoints(pair.attempt) };
    pair.phase = "done";
    H.timer = null;
    [pair.a, pair.b].forEach(pid => hostPlayer(pid).score += pair.pointsBy[pid]);
    H.lastResult.promotedIndex = advanceActivePair();
  } else if (pair.attempt >= MAX_ATTEMPTS) {
    pair.phase = "done";
    H.timer = null;
    H.lastResult.promotedIndex = advanceActivePair();
  } else {
    pair.attempt++;
    startGuessTimer(i);
  }
  broadcast();
}

/* Host-only: undo the last hostSetResult() tap. Only possible while nothing else has moved since
   (invalidateUndo() clears H.lastResult the instant any other pair changes), which guarantees any
   pair this call promoted is still untouched and safe to demote back to "waiting". */
function undoLastResult() {
  if (!H.lastResult) return;
  const { pairIndex, prevAttempt, prevHistory, prevPointsBy,
          prevScoreA, prevScoreB, prevActivePair, promotedIndex } = H.lastResult;
  const pair = H.pairs[pairIndex];
  if (!pair) { H.lastResult = null; broadcast(); return; }
  const bothConnected = hostPlayer(pair.a)?.connected && hostPlayer(pair.b)?.connected;
  pair.attempt = prevAttempt;
  pair.history = prevHistory;
  pair.pointsBy = prevPointsBy;
  hostPlayer(pair.a).score = prevScoreA;
  hostPlayer(pair.b).score = prevScoreB;
  if (bothConnected) {
    pair.phase = "guess";
    startGuessTimer(pairIndex);
    if (promotedIndex !== -1) H.pairs[promotedIndex].phase = "waiting";
    H.activePair = prevActivePair;
  } else {
    // a member left since the mistaken tap — can't resume their turn, just fix the score
    pair.phase = "done";
    pair.skipped = true;
    if (promotedIndex !== -1) H.activePair = promotedIndex;
    else advanceActivePair();
  }
  H.lastResult = null;
  broadcast();
}

function hostMsg(fromId, msg) {
  if (msg.t === "pick") handlePick(fromId, msg.word);
  else if (msg.t === "guess") handleGuess(fromId, msg.word);
}

/* Build the personalized view each player renders from */
function viewFor(id) {
  const me = hostPlayer(id);
  const base = {
    stage: H.stage,
    myName: me?.name || "",
    isHost: id === "me",
    players: H.players.map(p => ({ id: p.id, name: p.name, score: p.score, connected: p.connected, me: p.id === id })),
    round: H.roundIndex + 1,
    totalRounds: H.schedule.length,
    scoring: POINT_RANGES,
    mode: H.mode,
    lang: H.lang,
  };
  if (H.stage !== "round" || !me) return base;

  base.allDone = H.pairs.every(p => p.phase === "done");

  // Full pairing/turn overview (names, live progress, skip control) is host-only — players
  // never see who's paired with whom, or who's up next, until their own turn reveals it.
  if (base.isHost) {
    base.pairsStatus = H.pairs.map((p, i) => {
      const row = {
        names: [hostPlayer(p.a).name, hostPlayer(p.b).name],
        done: p.phase === "done",
        active: p.phase === "pick",
        waiting: p.phase === "waiting",
        skipped: !!p.skipped,
        points: p.pointsBy ? [p.pointsBy[p.a], p.pointsBy[p.b]] : null,
        disconnected: !hostPlayer(p.a).connected || !hostPlayer(p.b).connected,
        timedOut: H.timedOutPair === i,
      };
      if (p.phase !== "done") {
        row.phase = p.phase;
        row.attempt = p.attempt;
        row.words = p.phase === "guess" || p.phase === "done" ? [p.picks[p.a] ?? null, p.picks[p.b] ?? null] : null;
        row.timer = H.timer && H.timer.pairIndex === i ? timerSnapshot() : null;
      }
      return row;
    });
    base.pairsDoneCount = base.pairsStatus.filter(p => p.done).length;
    base.canUndo = !!H.lastResult;
  }

  const pair = pairOf(id);
  if (!pair) { base.bye = true; return base; }

  base.phase = pair.phase;
  base.attempt = pair.attempt;
  base.history = pair.history.map(h => ({
    mine: pair.a === id ? h.a : h.b,
    theirs: pair.a === id ? h.b : h.a,
    match: h.match,
    timeout: !!h.timeout,
  }));
  base.timedOutWaiting = H.timedOutPair === H.pairs.indexOf(pair);

  if (pair.phase === "waiting") {
    // Not their turn yet — cards are visible but the UI grays them out, and the partner
    // stays a mystery until this pair is actually promoted to "pick".
    base.hand = me.hand;
    base.myPick = null;
    return base;
  }

  const pid = partnerId(pair, id);
  if (pair.phase === "pick") {
    // Their turn has started, but the partner's identity still isn't revealed — only once
    // both of them have locked in a word does the pairing become visible (see below).
    base.hand = me.hand;
    base.myPick = pair.picks[id] || null;
    base.partnerPicked = !!pair.picks[pid];
    return base;
  }

  // guess or done: both have picked, so the pairing is finally revealed
  base.partner = hostPlayer(pid).name;
  base.myWord = pair.picks[id];
  base.partnerWord = pair.picks[pid];
  if (pair.phase === "guess") {
    base.guessed = pair.guesses[id] !== undefined;
    base.partnerGuessed = pair.guesses[pid] !== undefined;
    base.timer = H.timer && H.timer.pairIndex === H.pairs.indexOf(pair) ? timerSnapshot() : null;
  } else { // done
    base.points = pair.pointsBy ? pair.pointsBy[id] : 0;
    base.partnerPoints = pair.pointsBy ? pair.pointsBy[pid] : 0;
    base.skipped = !!pair.skipped;
  }
  return base;
}

function broadcast() {
  H.players.forEach(p => {
    const v = viewFor(p.id);
    if (p.id === "me") { myView = v; render(); }
    else if (p.conn && p.connected) { try { p.conn.send({ t: "view", view: v }); } catch (e) {} }
  });
}

function setupHost(name) {
  role = "host"; myName = name; myId = "me";
  requestWakeLock();
  const code = roomCode();
  renderConnecting(t(uiLang, "creatingRoom"));
  peer = new Peer(PEER_PREFIX + code, { config: ICE_SERVERS });
  peer.on("open", () => {
    H.players = [{ id: "me", name, conn: null, score: 0, hand: [], connected: true }];
    H.stage = "lobby";
    H.lang = uiLang;
    H.code = code;
    startHeartbeat();
    startGuessTimerLoop();
    broadcast();
  });
  peer.on("connection", conn => {
    conn.on("data", msg => {
      if (msg.t === "pong") {
        const pid = H.connMap[conn.peer];
        const pl = pid && hostPlayer(pid);
        if (pl) pl.lastPong = Date.now();
        return;
      }
      if (msg.t === "join") {
        // A kicked device is permanently banned from this room — checked before both the
        // mid-game reconnect path and the fresh-lobby-join path below.
        if (msg.pid && H.kickedPids.has(msg.pid)) { conn.send({ t: "reject", reason: "kicked" }); return; }
        if (H.stage !== "lobby") {
          // allow reconnect mid-game — matched by persistent device id (not name +
          // "currently marked disconnected") so a fast reconnect that beats the heartbeat
          // timeout still gets recognized, instead of being told the game already started.
          // Falls back to the old name-based match for any client that predates device ids.
          const existing = msg.pid
            ? H.players.find(p => p.pid === msg.pid)
            : H.players.find(p => p.name === msg.name && !p.connected);
          if (existing) {
            existing.conn = conn;
            existing.connected = true;
            existing.lastPong = Date.now();
            H.connMap[conn.peer] = existing.id;
            broadcast();
            return;
          }
          conn.send({ t: "reject", reason: "started" }); return;
        }
        if (H.players.length >= MAX_PLAYERS) { conn.send({ t: "reject", reason: "full" }); return; }
        let nm = msg.name.trim().slice(0, 16) || "Player";
        while (H.players.some(p => p.name === nm)) nm += "'";
        H.players.push({ id: conn.peer, name: nm, conn, score: 0, hand: [], connected: true, lastPong: Date.now(), pid: msg.pid });
        H.connMap[conn.peer] = conn.peer;
        conn.send({ t: "welcome", name: nm });
        broadcast();
      } else {
        const pid = H.connMap[conn.peer];
        if (pid) hostMsg(pid, msg);
      }
    });
    conn.on("close", () => {
      const pid = H.connMap[conn.peer];
      if (pid) dropPlayer(pid);
    });
  });
  peer.on("error", err => {
    console.warn("host peer error", err.type, err.message);
    if (err.type === "unavailable-id") setupHost(name); // code collision → retry
    else renderError(tf(uiLang, "connectionError", { type: err.message ? `${err.type}: ${err.message}` : err.type }));
  });
}

/* ---------------- GUEST LOGIC ---------------- */
let guestReconnectAttempts = 0;
let guestReconnectTimer = null;
let guestListenerAttached = false;
let lastHostMsgAt = 0;
let guestWatchdogTimer = null;

function setupGuest(name, code) {
  role = "guest"; myName = name;
  requestWakeLock();
  guestReconnectAttempts = 0;
  renderConnecting(tf(uiLang, "joiningRoom", { code }));
  connectToHost(name, code);
  if (!guestListenerAttached) {
    guestListenerAttached = true;
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && role === "guest" && (!hostConn || !hostConn.open) && !guestReconnectTimer) {
        guestReconnectAttempts = 0;
        attemptReconnect(name, code);
      }
    });
  }
  if (!guestWatchdogTimer) {
    // The host pings on HEARTBEAT_INTERVAL — if nothing (ping or otherwise) has come
    // through in a while, the data channel likely died silently without a "close" event.
    guestWatchdogTimer = setInterval(() => {
      if (role === "guest" && hostConn && hostConn.open && Date.now() - lastHostMsgAt > HEARTBEAT_TIMEOUT) {
        try { hostConn.close(); } catch (e) {}
      }
    }, HEARTBEAT_INTERVAL);
  }
}

function connectToHost(name, code) {
  peer = new Peer({ config: ICE_SERVERS });
  peer.on("open", () => {
    guestReconnectAttempts = 0;
    hostConn = peer.connect(PEER_PREFIX + code.toUpperCase(), { reliable: true });
    // Signaling can succeed (PeerJS finds the host) while ICE negotiation itself never completes —
    // no "error" or "close" event fires for that, it just hangs. VPNs/restrictive firewalls that
    // block plain UDP are the most common cause. Treat a stuck handshake as a failed attempt.
    const joinTimer = setTimeout(() => {
      if (!hostConn || !hostConn.open) { console.warn("guest join timed out before P2P connection opened"); attemptReconnect(name, code); }
    }, JOIN_TIMEOUT);
    hostConn.on("open", () => { clearTimeout(joinTimer); lastHostMsgAt = Date.now(); hostConn.send({ t: "join", name, pid: getDeviceId() }); });
    hostConn.on("data", msg => {
      lastHostMsgAt = Date.now();
      if (msg.t === "ping") { try { hostConn.send({ t: "pong" }); } catch (e) {} }
      else if (msg.t === "view") { myView = msg.view; render(); }
      else if (msg.t === "welcome") { myName = msg.name; }
      else if (msg.t === "removed") { renderError(t(curLang(), "removedByHost")); }
      else if (msg.t === "reject") {
        renderError(t(uiLang, msg.reason === "full" ? "roomFull" : msg.reason === "kicked" ? "removedByHost" : "gameAlreadyStarted"));
      }
    });
    hostConn.on("close", () => attemptReconnect(name, code));
  });
  peer.on("error", err => {
    console.warn("guest peer error", err.type, err.message);
    if (err.type === "peer-unavailable") renderError(tf(uiLang, "roomNotFound", { code: code.toUpperCase() }));
    else attemptReconnect(name, code);
  });
}

function attemptReconnect(name, code) {
  if (guestReconnectTimer) return;
  if (document.hidden) return; // wait for visibilitychange to kick a fresh attempt
  guestReconnectAttempts++;
  if (guestReconnectAttempts > GUEST_RECONNECT_MAX_TRIES) { renderError(t(curLang(), "lostConnection")); return; }
  renderConnecting(t(curLang(), "reconnecting"));
  guestReconnectTimer = setTimeout(() => {
    guestReconnectTimer = null;
    try { peer && peer.destroy(); } catch (e) {}
    connectToHost(name, code);
  }, GUEST_RECONNECT_DELAY);
}

function send(msg) {
  if (role === "host") hostMsg("me", msg);
  else if (hostConn) hostConn.send(msg);
}

/* ---------------- ACTIONS (both roles) ---------------- */
window.actPick = w => send({ t: "pick", word: w });
window.actGuess = () => {
  const inp = document.getElementById("guessInput");
  if (!inp || !norm(inp.value)) return;
  send({ t: "guess", word: inp.value });
};
window.actHostResult = (i, match) => { if (role === "host") hostSetResult(i, match); };
window.actSkipPair = i => { if (role === "host") skipPair(i); };
window.actMode = m => { if (role === "host" && H.stage === "lobby") { H.mode = m; broadcast(); } };
window.actLang = lang => {
  if (role !== "host" || H.stage !== "lobby") return;
  H.lang = lang; uiLang = lang; localStorage.setItem("medium-lang", lang); broadcast();
};
window.actStart = () => { if (role === "host") startGame(); };
window.actNext = () => { if (role === "host") nextRound(); };
window.actEnd = () => { if (role === "host") { clearTimerState(); H.stage = "end"; H.lastResult = null; captureLastGameRoster(); broadcast(); } };
window.actBackToLobby = () => {
  if (role !== "host") return;
  clearTimerState();
  H.players = H.players.filter(p => p.connected); // drop mid-game disconnects on the way back
  H.stage = "lobby";
  broadcast();
};
window.actTimerPause = () => {
  if (role !== "host" || !H.timer) return;
  if (H.timer.paused) { H.timer.deadline = Date.now() + H.timer.remainingMs; H.timer.paused = false; }
  else { H.timer.remainingMs = Math.max(0, H.timer.deadline - Date.now()); H.timer.paused = true; }
  broadcast();
};
window.actTimerAdd = () => {
  if (role !== "host" || !H.timer) return;
  if (H.timer.paused) H.timer.remainingMs += ADD_TIME_MS;
  else H.timer.deadline += ADD_TIME_MS;
  broadcast();
};
window.actContinue = () => {
  if (role !== "host" || H.timedOutPair === null) return;
  const i = H.timedOutPair;
  H.timedOutPair = null;
  const pair = H.pairs[i];
  if (pair && pair.phase === "guess") startGuessTimer(i); // more chances left — fresh 45s
  else advanceActivePair();                                 // was the 3rd-chance timeout — promote next pair
  broadcast();
};
window.actKick = id => { if (role === "host") kickPlayer(id); };
window.actUndoResult = () => { if (role === "host") undoLastResult(); };

/* ---------------- RENDERING ---------------- */
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

function header(lang) {

window.uiHost = () => {

window.uiShareInvite = async () => {

function renderConnecting(msg) {

  document.documentElement.lang = lang;
  $app.innerHTML = `${header(lang)}<div class="card center waiting-pulse">${esc(msg)}</div>`;
}
function renderError(msg) {

  $app.innerHTML = `${header(lang)}
    <div class="card center" style="border-color:var(--bad)">${esc(msg)}</div>
    <button class="secondary" onclick="location.reload()">${t(lang, "backBtn")}</button>`;

function scoreTable(v, final, lang) {
  const canKick = !final && v.isHost && v.stage === "round";
  const rows = [...v.players].sort((a, b) => b.score - a.score).map((p, i) => `
    <tr class="${p.me ? "me" : ""}">
      <td>${final && i === 0 ? "👑 " : ""}${esc(p.name)}${p.me ? t(lang, "youSuffix") : ""}${p.connected === false ? " ⚠️" : ""}${canKick && !p.me ? `<button class="chip-x" onclick="actKick('${esc(p.id)}')">✕</button>` : ""}</td>
      <td class="pts">${p.score}</td>
    </tr>`).join("");
  return `<table class="score"><tr><th>${t(lang, "playerCol")}</th><th style="text-align:right">${t(lang, "pointsCol")}</th></tr>${rows}</table>`;
}

// Client-side countdown animation: the host only broadcasts a remainingMs *snapshot* on state
// changes (never every second — broadcast() re-renders the whole screen and would wipe an
// in-progress guess). Guests animate that snapshot locally against their own clock, touching
// only .js-countdown elements' textContent so nothing else re-renders mid-tick.
let countdownInterval = null;
function syncCountdown(v) {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  const snap = v.timer || (v.pairsStatus && (v.pairsStatus.find(p => p.timer) || {}).timer);
  const els = document.querySelectorAll(".js-countdown");
  if (!els.length || !snap || snap.paused) return;
  const anchor = Date.now(), base = snap.remainingMs;
  const draw = () => {
    const s = Math.max(0, Math.ceil((base - (Date.now() - anchor)) / 1000));
    els.forEach(el => { el.textContent = `⏱ ${s}s`; el.classList.toggle("low", s <= 10); });
  };
  draw();
  countdownInterval = setInterval(draw, 250);
}
function stopCountdown() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

// The guess input's value lives only in the DOM, and every broadcast (partner locking in,
// timer pause/resume, a disconnect elsewhere) replaces $app.innerHTML — save the draft
// before each re-render and restore it after, but only within the same chance: the
// signature (round + partner + attempt) changes whenever a fresh chance should start empty.
// The draft is stamped with the sig of the render that created the input (lastRenderSig),
// not the incoming one — otherwise a just-submitted word still sitting in the old DOM when
// a failed chance re-renders would leak into the next chance's empty input.
let guessDraft = null;    // {sig, value, selStart, selEnd}
let lastRenderSig = null; // draftSig of the most recent round render

function render() {
  const v = myView;
  if (!v) return;
  document.documentElement.lang = v.lang || uiLang;
  if (v.stage === "lobby") { stopCountdown(); guessDraft = null; return renderLobby(v); }
  if (v.stage === "round") return renderRound(v);
  if (v.stage === "end") { stopCountdown(); guessDraft = null; return renderEnd(v); }
}

function renderLobby(v) {
  const lang = v.lang || uiLang;
  const chips = v.players.map(p =>
    `<span class="player-chip"><span class="dot ${p.connected === false ? "off" : ""}"></span>${esc(p.name)}${p.me ? t(lang, "youSuffix") : ""}${v.isHost && !p.me ? `<button class="chip-x" onclick="actKick('${esc(p.id)}')">✕</button>` : ""}</span>`).join("");
  $app.innerHTML = `
    ${header(lang)}
    ${v.isHost ? `
      <div class="card center stack">
        <div class="label">${t(lang, "roomCodeLabel")}</div>
        <div class="big-code">${esc(H.code)}</div>
        <div class="small">${t(lang, "roomCodeHint")}</div>
        <button class="secondary" id="shareLinkBtn" onclick="uiShareInvite()">${t(lang, "copyLinkBtn")}</button>
        <div class="small" style="word-break:break-all">${esc(location.origin + location.pathname)}?code=${esc(H.code)}</div>
      </div>` : `
      <div class="card center waiting-pulse">${t(lang, "waitingHostStart")}</div>`}
    <div class="card">
      <div class="label">${tf(lang, "playersLabel", { n: v.players.length, max: MAX_PLAYERS })}</div>
      <div>${chips}</div>
    </div>
    ${v.isHost ? langToggleCard(lang, v.lang, "actLang") : `
      <div class="card center small">${t(lang, "langDisplayPrefix")}${v.lang === "es" ? t(lang, "langEsBtn") : t(lang, "langEnBtn")}</div>`}
    ${v.isHost ? `
      <div class="card stack">
        <div class="label">${t(lang, "gameModeLabel")}</div>
        <div class="row">
          <button class="word-btn ${v.mode === "type" ? "selected" : ""}" onclick="actMode('type')">${t(lang, "modeTypeBtn")}</button>
          <button class="word-btn ${v.mode === "local" ? "selected" : ""}" onclick="actMode('local')">${t(lang, "modeLocalBtn")}</button>
        </div>
        <div class="small center">${v.mode === "type" ? t(lang, "modeTypeDesc") : t(lang, "modeLocalDesc")}</div>
      </div>` : `
      <div class="card center small">${t(lang, "modeDisplayPrefix")}${v.mode === "type" ? t(lang, "modeTypeBtn") : t(lang, "modeLocalBtn")}</div>`}
    ${v.isHost ? `<button onclick="actStart()" ${v.players.length < 2 ? "disabled" : ""}>
      ${v.players.length < 2 ? t(lang, "needMorePlayers") : t(lang, "startGameBtn")}</button>` : ""}`;
}

function roundHeader(v, lang) {
  // Partner identity is a secret until both players in the pair have picked a word —
  // until then, show a turn-status subtitle instead of a name.
  let subtitle;
  if (v.bye) subtitle = t(lang, "youSitOut");
  else if (v.partner) subtitle = tf(lang, "youPlus", { partner: esc(v.partner) });
  else if (v.phase === "waiting") subtitle = t(lang, "waitingYourTurnHeader");
  else subtitle = t(lang, "yourTurnHeader");
  return `<div class="round-header card">
    <div class="rnum">${tf(lang, "roundLabel", { r: v.round, t: v.totalRounds })}</div>
    <div class="partner">${subtitle}</div>
  </div>`;
}

function hostControls(v, lang) {
  if (!v.isHost) return "";
  return `<div class="stack">
    ${v.canUndo ? `<button class="secondary" onclick="actUndoResult()">${t(lang, "undoResultBtn")}</button>` : ""}
    <button onclick="actNext()" ${v.allDone ? "" : "disabled"}>
      ${v.round >= v.totalRounds ? t(lang, "finishGameBtn") : t(lang, "nextRoundBtn")}${v.allDone ? "" : t(lang, "waitingForPairsSuffix")}</button>
    <button class="secondary" onclick="actEnd()">${t(lang, "endGameBtn")}</button>
  </div>`;
}

function pairsStatus(v, lang) {
  // Host-only: players never see the pairing/turn overview, so this simply renders nothing for them.
  if (!v.pairsStatus) return "";
  if (v.pairsStatus.length === 0) {
    return `<div class="card"><div class="label">${t(lang, "thisRoundLabel")}</div><div class="small">${t(lang, "noActivePairs")}</div></div>`;
  }
  const rows = v.pairsStatus.map((p, i) => {
    const label = `<span>${esc(p.names[0])} + ${esc(p.names[1])}${p.disconnected && !p.done ? ` <span class="small">(${t(lang, "skippedStatus")})</span>` : ""}</span>
      <span class="st ${p.done ? (p.points ? "done" : "fail") : ""}">${p.done ? (p.points ? "✓ +" + p.points.join(" / +") + " pts" : t(lang, p.skipped ? "skippedStatus" : "noMatchStatus")) : t(lang, p.waiting ? "waitingTurnStatus" : "playingStatus")}</span>`;
    const continueButton = p.timedOut
      ? `<div class="small">⏰ ${t(lang, "timeUpStatus")}</div><button onclick="actContinue()">${t(lang, "continueBtn")}</button>` : "";
    if (p.done) {
      return `<div class="pr" style="flex-direction:column; align-items:stretch; gap:6px">
        <div style="display:flex; justify-content:space-between">${label}</div>
        ${continueButton}
      </div>`;
    }
    // Host-only live detail: current chance + the words once both are revealed
    const detail = p.phase === "waiting"
      ? t(lang, "awaitingTurnHost")
      : p.phase === "pick"
      ? t(lang, "stillChoosingHost")
      : tf(lang, "chanceLabel", { a: p.attempt, lo: v.scoring[p.attempt][0], hi: v.scoring[p.attempt][1] })
        + (p.words && p.words[0] && p.words[1] ? ` — ${esc(p.words[0])} ↔ ${esc(p.words[1])}` : "");
    const timerPill = p.timer
      ? `<span class="timer-pill js-countdown ${p.timer.paused ? "paused" : ""}">${p.timer.paused ? t(lang, "pausedLabel") : `⏱ ${Math.ceil(p.timer.remainingMs / 1000)}s`}</span>` : "";
    const timerButtons = p.timer ? `
        <div class="row">
          <button class="secondary" onclick="actTimerPause()">${t(lang, p.timer.paused ? "resumeBtn" : "pauseBtn")}</button>
          <button class="secondary" onclick="actTimerAdd()">${t(lang, "addTimeBtn")}</button>
        </div>` : "";
    const matchButtons = v.mode === "local" && p.phase === "guess" && !p.timedOut ? `
        <div class="row">
          <button onclick="actHostResult(${i}, true)">${t(lang, "weMatchedBtn")}</button>
          <button class="secondary" onclick="actHostResult(${i}, false)">${t(lang, "noMatchBtn")}</button>
        </div>` : "";
    const skipButton = p.disconnected ? `<button class="secondary" onclick="actSkipPair(${i})">${t(lang, "skipPairBtn")}</button>` : "";
    return `<div class="pr ${p.active ? "pr-active" : ""}" style="flex-direction:column; align-items:stretch; gap:6px">
      <div style="display:flex; justify-content:space-between">${p.active ? `<span class="pr-active-tag">▶ </span>` : ""}${label}</div>
      <div class="small">${detail}${timerPill}</div>
      ${timerButtons}
      ${continueButton}
      ${matchButtons}
      ${skipButton}
    </div>`;
  }).join("");
  return `<div class="card"><div class="label">${tf(lang, "thisRoundCountLabel", { done: v.pairsDoneCount, total: v.pairsStatus.length })}</div><div class="pairs-list">${rows}</div></div>`;
}

function renderRound(v) {
  const lang = v.lang || uiLang;
  let body = "";
  if (v.bye) {
    body = `<div class="card center">${t(lang, "relaxNextRound")}</div>`;
  } else if (v.phase === "waiting") {
    // Not this pair's turn yet — cards shown but grayed out, no partner revealed.
    body = `
      <div class="card stack">
        <div class="label">${t(lang, "pickWordLabel")}</div>
        ${v.hand.map(w => `<button class="word-btn" disabled>${esc(w)}</button>`).join("")}
        <div class="status-banner waiting-pulse">${t(lang, "waitingYourTurnStatus")}</div>
      </div>`;
  } else if (v.phase === "pick") {
    // Their turn, but the partner stays anonymous until both of them have picked.
    body = `
      <div class="card stack">
        <div class="label">${t(lang, "pickWordLabel")}</div>
        ${v.hand.map(w => `<button class="word-btn ${v.myPick === w ? "selected" : ""}"
          ${v.myPick ? "disabled" : ""} onclick="actPick('${esc(w)}')">${esc(w)}</button>`).join("")}
        <div class="status-banner ${v.myPick ? "waiting-pulse" : ""}">
          ${v.myPick ? (v.partnerPicked ? "" : t(lang, "stillPickingAnon"))
                     : (v.partnerPicked ? t(lang, "alreadyPickedAnon") : t(lang, "partnerPickingToo"))}
        </div>
      </div>`;
  } else { // guess or done
    const hist = v.history.map((h, i) => h.timeout ? `
      <div class="history-row">
        <span>${h.mine ? esc(h.mine) : "—"}</span>
        <span class="mark">⏰</span>
        <span>${t(lang, "timedOutHist")}</span>
      </div>` : h.mine == null ? `
      <div class="history-row">
        <span>${tf(lang, "chanceHistLabel", { n: i + 1 })}</span>
        <span class="mark">${h.match ? "🤝" : "≠"}</span>
        <span>${h.match ? t(lang, "matchedHist") : t(lang, "noMatchHist")}</span>
      </div>` : `
      <div class="history-row">
        <span>${esc(h.mine)}</span>
        <span class="mark">${h.match ? "🤝" : "≠"}</span>
        <span>${esc(h.theirs)}</span>
      </div>`).join("");
    const timerPill = v.timer
      ? `<span class="timer-pill js-countdown ${v.timer.paused ? "paused" : ""}">${v.timer.paused ? t(lang, "pausedLabel") : `⏱ ${Math.ceil(v.timer.remainingMs / 1000)}s`}</span>` : "";
    if (v.phase === "guess" && v.timedOutWaiting) {
      body = `
        <div class="card stack">
          <div class="pair-words">
            <div class="pair-word"><span class="who">${t(lang, "yourWordLabel")}</span>${esc(v.myWord)}</div>
            <span class="vs">↔</span>
            <div class="pair-word"><span class="who">${tf(lang, "partnerWordLabel", { partner: esc(v.partner) })}</span>${esc(v.partnerWord)}</div>
          </div>
          ${hist ? `<div class="stack">${hist}</div>` : ""}
          <div class="match-flash bad">${t(lang, "timedOutFlash")}</div>
          <div class="status-banner waiting-pulse">${t(lang, "waitingHostResume")}</div>
        </div>`;
    } else if (v.phase === "guess" && v.mode === "local") {
      body = `
        <div class="card stack">
          <div class="pair-words">
            <div class="pair-word"><span class="who">${t(lang, "yourWordLabel")}</span>${esc(v.myWord)}</div>
            <span class="vs">↔</span>
            <div class="pair-word"><span class="who">${tf(lang, "partnerWordLabel", { partner: esc(v.partner) })}</span>${esc(v.partnerWord)}</div>
          </div>
          <div class="center"><span class="attempt-pill">${tf(lang, "chanceLabel", { a: v.attempt, lo: v.scoring[v.attempt][0], hi: v.scoring[v.attempt][1] })}</span>${timerPill}</div>
          ${hist ? `<div class="stack">${hist}</div>` : ""}
          ${v.timer && v.timer.paused
            ? `<div class="status-banner">${t(lang, "pausedBanner")}</div>`
            : `<div class="label center">${t(lang, "countdownLabel")}</div>
               <div class="status-banner waiting-pulse">${t(lang, "hostConfirmLabel")}</div>`}
        </div>`;
    } else if (v.phase === "guess") {
      body = `
        <div class="card stack">
          <div class="pair-words">
            <div class="pair-word"><span class="who">${t(lang, "yourWordLabel")}</span>${esc(v.myWord)}</div>
            <span class="vs">↔</span>
            <div class="pair-word"><span class="who">${tf(lang, "partnerWordLabel", { partner: esc(v.partner) })}</span>${esc(v.partnerWord)}</div>
          </div>
          <div class="center"><span class="attempt-pill">${tf(lang, "chanceLabel", { a: v.attempt, lo: v.scoring[v.attempt][0], hi: v.scoring[v.attempt][1] })}</span>${timerPill}</div>
          ${hist ? `<div class="stack">${hist}</div>` : ""}
          ${v.timer && v.timer.paused
            ? `<div class="status-banner">${t(lang, "pausedBanner")}</div>`
            : v.guessed
            ? `<div class="status-banner waiting-pulse">${tf(lang, "waitingForPartner", { partner: esc(v.partner) })}</div>`
            : `<div class="label center">${tf(lang, "typeInBetween", { partner: esc(v.partner) })}</div>
               <input type="text" id="guessInput" placeholder="${esc(t(lang, "guessPlaceholder"))}" autocomplete="off"
                 onkeydown="if(event.key==='Enter')actGuess()">
               <button onclick="actGuess()">${t(lang, "lockInBtn")} ${v.partnerGuessed ? tf(lang, "partnerReadySuffix", { partner: esc(v.partner) }) : ""}</button>`}
        </div>`;
    } else { // done
      body = `
        <div class="card stack">
          ${v.myWord && v.partnerWord ? `
          <div class="pair-words">
            <div class="pair-word"><span class="who">${t(lang, "yourWordLabel")}</span>${esc(v.myWord)}</div>
            <span class="vs">↔</span>
            <div class="pair-word"><span class="who">${tf(lang, "partnerWordLabel", { partner: esc(v.partner) })}</span>${esc(v.partnerWord)}</div>
          </div>` : ""}
          ${hist ? `<div class="stack">${hist}</div>` : ""}
          <div class="match-flash ${v.points ? "good" : "bad"}">
            ${v.points ? tf(lang, "matchedFlash", { points: v.points }) : t(lang, v.skipped ? "roundSkippedFlash" : "noMatchFlash")}
          </div>
          ${v.points ? `<div class="center small">${tf(lang, "partnerRolled", { partner: esc(v.partner), points: v.partnerPoints })}</div>` : ""}
          <div class="status-banner">${t(lang, "waitingNextRound")}</div>
        </div>`;
    }
  }
  const draftSig = `${v.round}:${v.partner ?? ""}:${v.attempt ?? ""}`;
  const oldInput = document.getElementById("guessInput");
  if (oldInput) guessDraft = { sig: lastRenderSig, value: oldInput.value, selStart: oldInput.selectionStart, selEnd: oldInput.selectionEnd };
  lastRenderSig = draftSig;
  $app.innerHTML = `
    ${header(lang)}
    ${roundHeader(v, lang)}
    ${body}
    ${pairsStatus(v, lang)}
    <div class="card"><div class="label">${t(lang, "scoreboardLabel")}</div>${scoreTable(v, false, lang)}</div>
    ${hostControls(v, lang)}`;
  const gi = document.getElementById("guessInput");
  if (gi) {
    gi.focus();
    if (guessDraft && guessDraft.sig === draftSig) {
      gi.value = guessDraft.value;
      gi.setSelectionRange(guessDraft.selStart, guessDraft.selEnd);
    } else {
      guessDraft = null;
    }
  }
  syncCountdown(v);
}

function renderEnd(v) {
  const lang = v.lang || uiLang;
  $app.innerHTML = `
    ${header(lang)}
    <div class="card center"><div class="match-flash good">${t(lang, "finalScoresTitle")}</div>${scoreTable(v, true, lang)}</div>
    ${v.isHost ? `
      <div class="stack">
        <button onclick="actBackToLobby()">${t(lang, "backToLobbyBtn")}</button>
        <button class="secondary" onclick="actStart()">${t(lang, "restartGameBtn")}</button>
      </div>`
               : `<div class="card center small">${t(lang, "thanksPlaying")}</div>`}`;
}

renderHome();
</script>
</body>
</html>
